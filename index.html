<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>华帝厨房健康诊断报告</title>
<style>
:root {
  --red: #C41E3A; --red-bg: #FFF5F5; --green: #2E7D32; --green-bg: #E8F5E9;
  --orange: #E67E22; --orange-bg: #FFF8F0; --dark: #1a1a1a; --gray: #666;
  --gray-light: #999; --bg: #f2f2f2; --card: #fff; --border: #e0e0e0; --radius: 12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--dark);line-height:1.5;-webkit-font-smoothing:antialiased}

/* Header */
.header{background:linear-gradient(135deg,#C41E3A 0%,#a01830 100%);color:#fff;padding:16px 16px 12px;text-align:center;position:sticky;top:0;z-index:100}
.header .brand{font-size:18px;font-weight:700;letter-spacing:2px}
.header .sub{font-size:11px;opacity:0.75;margin-top:2px}

/* Container */
.container{max-width:600px;margin:0 auto;padding:0 0 40px}

/* Edit Mode */
#editMode{padding:0 12px 40px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-top:12px;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
.card-title{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--red);display:flex;align-items:center;gap:6px}
.card-title .icon{font-size:18px}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--red);background:#fff}
.form-row{display:flex;gap:8px}.form-row .form-group{flex:1}

/* Check items */
.check-item{display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
.check-item:last-child{border-bottom:none}
.check-num{width:22px;height:22px;border-radius:50%;background:#f0f0f0;color:var(--gray);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.check-info{flex:1;min-width:0}
.check-name{font-size:13px;font-weight:600;color:var(--dark)}
.check-desc{font-size:11px;color:var(--gray-light);margin-top:1px}
.check-result{display:flex;gap:6px;flex-shrink:0}
.check-result label{font-size:11px;padding:4px 10px;border-radius:14px;cursor:pointer;border:1.5px solid var(--border);background:#fff;transition:all 0.2s;white-space:nowrap}
.check-result input{display:none}
.check-result input:checked+label.pass{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:600}
.check-result input:checked+label.fail{background:#FFEBEE;border-color:var(--red);color:var(--red);font-weight:600}
.check-value{width:100%;margin-top:6px;display:none}
.check-item.has-value .check-value{display:block}
.check-value input,.check-value select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit}

/* Buttons */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;margin-top:16px}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:active{background:#a01830;transform:scale(0.98)}
.btn-outline{background:#fff;color:var(--red);border:2px solid var(--red);margin-top:8px}
.btn-sm{padding:8px 16px;font-size:12px;margin-top:8px;width:auto;display:inline-block}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:25px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

/* ========== CONSUMER REPORT VIEW ========== */
#reportView{padding:0}
.report-header{background:var(--card);padding:20px 16px 16px;margin:0;border-radius:0}
.report-header .greeting{font-size:13px;color:var(--gray);margin-bottom:6px}
.report-header .report-title{font-size:20px;font-weight:800;color:var(--dark);margin-bottom:4px}
.report-header .issue-count{font-size:14px;color:var(--red);font-weight:700;margin-bottom:2px}
.report-header .report-date{font-size:12px;color:var(--gray-light)}
.report-stamp{position:absolute;top:12px;right:16px;border:2px solid var(--red);border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;color:var(--red);font-weight:700;transform:rotate(-15deg);opacity:0.8;line-height:1.3}
.report-header{position:relative}

/* Tabs */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;color:var(--gray-light);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.active{color:var(--red);border-bottom-color:var(--red)}

/* Report Content */
.r-content{padding:0}
.r-section{margin-top:0;background:var(--card);margin-bottom:8px}
.r-section-title{padding:12px 16px;font-size:14px;font-weight:700;color:var(--dark);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}

/* Problem item */
.problem-item{padding:0;border-bottom:1px solid var(--border)}
.problem-item:last-child{border-bottom:none}
.problem-bar{background:var(--red);color:#fff;padding:8px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.problem-bar .p-num{background:rgba(255,255,255,0.25);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.problem-bar .p-text{flex:1}
.problem-detail{padding:12px 16px;display:flex;gap:16px}
.problem-metric{flex:1;text-align:center}
.problem-metric .m-label{font-size:11px;color:var(--gray-light);margin-bottom:2px}
.problem-metric .m-value{font-size:18px;font-weight:700}
.problem-metric .m-value.bad{color:var(--red)}
.problem-metric .m-value.good{color:var(--green)}

/* Normal check item (full report) */
.normal-item{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:10px}
.normal-item:last-child{border-bottom:none}
.normal-item .ni-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.normal-item .ni-status.ok{background:var(--green)}
.normal-item .ni-status.bad{background:var(--red)}
.normal-item .ni-name{flex:1;font-size:13px}
.normal-item .ni-value{font-size:12px;color:var(--gray-light);margin-right:4px}
.normal-item .ni-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.normal-item .ni-badge.ok{background:var(--green-bg);color:var(--green)}
.normal-item .ni-badge.bad{background:#FFEBEE;color:var(--red)}

/* Suggestion card */
.sg-card{background:#FFF8F0;border:1px solid #FFE0B2;border-radius:8px;padding:12px;margin:8px 16px}
.sg-card .sg-title{font-size:13px;font-weight:600;color:var(--dark)}
.sg-card .sg-text{font-size:12px;color:var(--gray);margin-top:4px}
.sg-card .sg-product{font-size:11px;color:var(--red);margin-top:4px;font-weight:600}
.sg-card .risk-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;margin-bottom:6px}
.sg-card .risk-tag.high{background:#FFEBEE;color:var(--red)}
.sg-card .risk-tag.mid{background:#FFF8F0;color:var(--orange)}
.sg-card .risk-tag.low{background:var(--green-bg);color:var(--green)}

/* Service badges */
.svc-badges{padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px}
.svc-badge{background:var(--green-bg);color:var(--green);font-size:11px;padding:4px 10px;border-radius:12px;font-weight:600}

/* Store card */
.store-card{padding:14px 16px;font-size:12px;color:var(--gray);line-height:1.8}
.store-card .sc-label{color:var(--gray-light);display:inline-block;width:50px}

/* Footer */
.r-footer{text-align:center;padding:16px;font-size:11px;color:var(--gray-light)}
.r-footer .share-btn{display:inline-block;background:var(--red);color:#fff;padding:10px 32px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;margin:8px 4px;border:none;font-family:inherit}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:var(--radius);padding:24px;margin:20px;max-width:400px;width:100%;text-align:center}
.modal-box .url-box{background:#f5f5f5;padding:12px;border-radius:8px;word-break:break-all;font-size:12px;text-align:left;max-height:100px;overflow-y:auto;margin:12px 0}

/* Hide modes */
.hidden{display:none!important}
.history-item{padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.history-item:last-child{border-bottom:none}
.history-item .hi-top{display:flex;justify-content:space-between;align-items:center}
.history-item .hi-name{font-size:13px;font-weight:600;color:var(--dark)}
.history-item .hi-date{font-size:11px;color:var(--gray-light)}
.history-item .hi-meta{font-size:11px;color:var(--gray);margin-top:2px}
.history-item .hi-badge{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.history-item .hi-badge.issue{background:#FFEBEE;color:var(--red)}
.history-item .hi-badge.ok{background:var(--green-bg);color:var(--green)}
</style>
</head>
<body>

<div class="header" id="header">
  <div class="brand">华帝 VATTI</div>
  <div class="sub" id="headerSub">厨房电器上门安检</div>
</div>

<div class="toast" id="toast"></div>

<!-- ==================== EDIT MODE ==================== -->
<div class="container" id="editMode">
  <div class="card">
    <div class="card-title"><span class="icon">👤</span> 客户基本信息</div>
    <div class="form-row"><div class="form-group"><label>客户称呼 *</label><input id="cName" placeholder="先生/女士"></div><div class="form-group"><label>联系电话 *</label><input id="cPhone" type="tel" placeholder="手机号"></div></div>
    <div class="form-row"><div class="form-group"><label>服务小区</label><input id="cCommunity" placeholder="如：阳光叠彩小区"></div><div class="form-group"><label>检测日期</label><input id="cDate" type="date"></div></div>
    <div class="form-group"><label>服务人员</label><input id="cStaff" placeholder="安检员姓名"></div>
  </div>

  <div class="card"><div class="card-title"><span class="icon">🔥</span> 燃气安全检测</div><div id="gasChecks"></div></div>
  <div class="card"><div class="card-title"><span class="icon">⚡</span> 电路安全检测</div><div id="elecChecks"></div></div>
  <div class="card"><div class="card-title"><span class="icon">💧</span> 水路健康检测</div><div id="waterChecks"></div></div>
  <div class="card"><div class="card-title"><span class="icon">💨</span> 油烟健康检测</div><div id="smokeChecks"></div></div>
  <div class="card"><div class="card-title"><span class="icon">🔬</span> 水质健康检测</div><div id="wqualChecks"></div></div>

  <div class="card">
    <div class="card-title"><span class="icon">🔧</span> 整改建议</div>
    <div id="sgList"></div>
    <button class="btn btn-outline btn-sm" onclick="addSg()">+ 添加建议</button>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">🏪</span> 门店信息</div>
    <div class="form-row"><div class="form-group"><label>门店名称</label><input id="sName" placeholder="门店名称"></div><div class="form-group"><label>门店电话</label><input id="sPhone" type="tel" placeholder="门店电话"></div></div>
  </div>

  <button class="btn btn-primary" onclick="gen()">📱 生成消费者检测报告链接</button>
  <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--gray-light)">填写完成后点击生成链接，复制发送给消费者</div>

  <!-- 发送历史 -->
  <div class="card" id="historyCard" style="display:none">
    <div class="card-title"><span class="icon">📋</span> 发送历史 <span style="font-weight:400;font-size:11px;color:var(--gray-light);margin-left:8px">（本设备记录）</span></div>
    <div id="historyList"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-outline btn-sm" onclick="exportHistory()" style="flex:1">📥 导出CSV</button>
      <button class="btn btn-outline btn-sm" onclick="clearHistory()" style="flex:1;color:var(--gray-light)">🗑 清空记录</button>
    </div>
  </div>
</div>

<!-- ==================== RESULT MODAL ==================== -->
<div id="resultModal" class="hidden">
  <div class="modal-overlay" onclick="backEdit()"></div>
  <div class="modal-box" style="position:relative;z-index:201">
    <div style="font-size:48px">✅</div>
    <div style="font-size:16px;font-weight:700;margin:8px 0">检测报告已生成</div>
    <div style="font-size:12px;color:var(--gray);margin-bottom:4px" id="resultMsg">数据已自动上报飞书</div>
    <div id="feishuStatus" style="font-size:11px;color:var(--gray-light);margin-bottom:8px"></div>
    <button class="btn btn-primary" onclick="shareToWechat()" style="margin-top:8px;font-size:15px;padding:12px 24px">📤 发送给消费者</button>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-outline btn-sm" onclick="previewR()" style="flex:1">👁️ 预览</button>
      <button class="btn btn-outline btn-sm" onclick="copyUrl()" style="flex:1">📋 复制链接</button>
      <button class="btn btn-outline btn-sm" onclick="backEdit()" style="flex:1">↩ 返回</button>
    </div>
  </div>
</div>

<!-- ==================== CONSUMER REPORT VIEW ==================== -->
<div class="container hidden" id="reportView">
  <div class="report-header">
    <div class="report-stamp">华帝<br>专业检测</div>
    <div class="greeting" id="rGreeting"></div>
    <div class="report-title">厨房健康诊断报告</div>
    <div class="issue-count" id="rIssueCount"></div>
    <div class="report-date" id="rDate"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('problem')" id="tabProblem">⚠️ 问题诊断</button>
    <button class="tab" onclick="switchTab('full')" id="tabFull">📋 完整报告</button>
  </div>

  <div class="r-content" id="rContent"></div>

  <div class="r-footer">
    <div style="margin-bottom:8px">华帝股份有限公司 | 厨房电器上门安检</div>
    <button class="share-btn" onclick="shareReport()">📤 一键分享</button>
  </div>
</div>

var sgCount = 0;
function renderSg() {
  var c = document.getElementById('sgList'); c.innerHTML = '';
  for (var i = 0; i < Math.max(sgCount, 1); i++) {
    var div = document.createElement('div'); div.style.cssText = 'padding:8px 0;border-bottom:1px solid var(--border)';
    var del = i>=1?'<button onclick="removeSg(this)" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer">删除</button>':'';
    div.innerHTML = '<div class="form-group"><label>问题描述</label><input class="sgP" placeholder="如：灶具火盖腐蚀严重"></div><div class="form-row"><div class="form-group" style="flex:1"><select class="sgR"><option value="0">低风险</option><option value="1">中风险</option><option value="2">高风险</option></select></div><div class="form-group" style="flex:2"><input class="sgPr" placeholder="整改建议/推荐产品（选填）"></div></div>'+del;
    c.appendChild(div);
  }
  sgCount = Math.max(sgCount, 1);
}
function addSg(){sgCount++;renderSg();}

// ===== COLLECT DATA =====
function collect() {
  var d = { v: 2, c: {}, g: {}, e: {}, w: {}, s: {}, q: {}, sg: [], st: {} };
  d.c.n = document.getElementById('cName').value.trim();
  d.c.p = document.getElementById('cPhone').value.trim();
  d.c.cm = document.getElementById('cCommunity').value.trim();
  d.c.dt = document.getElementById('cDate').value;
  d.c.st = document.getElementById('cStaff').value.trim();

  var keys = {gas:'g',elec:'e',water:'w',smoke:'s',wqual:'q'};
  GKEYS.forEach(function(gk) {
    var gr = G[gk], dk = keys[gk]; d[dk] = {};
    gr.items.forEach(function(item) {
      if (item.type === 'yn' || item.type === 'yn2' || item.type === 'pipe' || item.type === 'year') {
        var badEl = document.getElementById(item.id+'_bad');
        d[dk][item.id] = badEl && badEl.checked ? 'bad' : 'ok';
        // Save reason for yn/yn2/year types
        if (badEl && badEl.checked) {
          var reasonEl = document.querySelector('#'+item.id+' .yn-reason');
          if (reasonEl && reasonEl.value.trim()) d[dk][item.id+'_r'] = reasonEl.value.trim();
        }
      } else if (item.type === 'val') {
        var valEl = document.querySelector('#'+item.id+' .check-value input');
        d[dk][item.id] = valEl && valEl.value.trim() ? valEl.value.trim() : '';
      } else if (item.type === 'num') {
        var badEl = document.getElementById(item.id+'_bad');
        var okEl = document.getElementById(item.id+'_ok');
        var valEl = document.querySelector('#'+item.id+' .check-value input');
        var isBad = badEl && badEl.checked;
        d[dk][item.id] = isBad ? 'bad' : 'ok';
        if (valEl && valEl.value.trim()) d[dk][item.id+'_val'] = valEl.value.trim();
      } else if (item.type === 'level') {
        for (var li = 0; li < item.levels.length; li++) {
          var el = document.getElementById(item.id+'_l'+li);
          if (el && el.checked) { d[dk][item.id] = li; d[dk][item.id+'_label'] = item.levels[li]; break; }
        }
        if (d[dk][item.id] === undefined) d[dk][item.id] = -1;
      } else if (item.type === 'cl') {
        item.levels.forEach(function(lv) {
          var el = document.getElementById(item.id+'_'+lv.replace('.','_'));
          if (el && el.checked) { d[dk][item.id] = lv; }
        });
        if (d[dk][item.id] === undefined) d[dk][item.id] = '';
      }
    });
  });

  d.sg = [];
  document.querySelectorAll('#sgList>div').forEach(function(div) {
    var p = div.querySelector('.sgP').value.trim(), r = div.querySelector('.sgR').value, pr = div.querySelector('.sgPr').value.trim();
    if (p||pr) d.sg.push({p:p, r:parseInt(r), pr:pr});
  });

  d.st.n = document.getElementById('sName').value.trim();
  d.st.p = document.getElementById('sPhone').value.trim();
  return d;
}

// ===== GENERATE =====
function gen() {
  var d = collect();
  if (!d.c.n && !d.c.p) { toast('请至少填写客户称呼或电话'); return; }
  gData = d;
  var json = JSON.stringify(d), compressed = LZString.compressToBase64(json);
  gUrl = window.location.href.split('#')[0].split('?')[0] + '#data=' + compressed;
  document.getElementById('editMode').classList.add('hidden');
  document.getElementById('resultModal').classList.remove('hidden');
  document.getElementById('resultMsg').textContent = '正在上报飞书…';
  document.getElementById('feishuStatus').textContent = '';
  document.getElementById('headerSub').textContent = '报告已生成';
  saveHistory(d, gUrl);
  // 自动上报飞书
  autoUploadFeishu(d);
}

function copyUrl() {
  if (navigator.clipboard) { navigator.clipboard.writeText(gUrl).then(function(){ toast('✅ 链接已复制'); }); }
  else { var ta=document.createElement('textarea');ta.value=gUrl;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✅ 已复制'); }
}

// ===== 飞书自动上报 =====
var FEISHU_PROXY_URL = 'https://vatti-inspection-report.vercel.app/api/feishu-report';

function autoUploadFeishu(d) {
  var payload = JSON.parse(JSON.stringify(d));
  payload._url = gUrl;
  
  fetch(FEISHU_PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.ok) {
      document.getElementById('resultMsg').textContent = '✅ 数据已同步飞书';
      document.getElementById('feishuStatus').textContent = '记录ID: ' + (res.record_id || '').substring(0,12) + '...';
      // 保存上报状态到 history
      var hist = []; try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}
      if (hist.length > 0) { hist[0].feishu = res.record_id; hist[0].feishu_link = res.link; localStorage.setItem(HIST_KEY, JSON.stringify(hist)); }
    } else {
      document.getElementById('resultMsg').textContent = '⚠️ 飞书同步失败，数据已保存在本机';
      document.getElementById('feishuStatus').textContent = res.msg || '';
    }
  }).catch(function(e) {
    document.getElementById('resultMsg').textContent = '⚠️ 飞书暂不可用，数据已保存在本机';
    document.getElementById('feishuStatus').textContent = '';
  });
}

function shareToWechat() {
  if (!gUrl) { toast('⚠️ 请先生成报告'); return; }
  
  var title = '华帝厨房健康诊断报告';
  var desc = '尊敬的' + (gData.c.n || gData.c.cm || '业主') + '，这是您的厨房健康诊断报告';
  
  // 方式1: Web Share API (微信浏览器支持)
  if (navigator.share) {
    navigator.share({ title: title, text: desc, url: gUrl })
      .then(function() { toast('✅ 已发送'); })
      .catch(function(e) { /* 用户取消分享，不做处理 */ });
    return;
  }
  
  // 方式2: WeixinJSBridge (老版本微信)
  if (typeof WeixinJSBridge !== 'undefined' && WeixinJSBridge.invoke) {
    WeixinJSBridge.invoke('sendAppMessage', {
      title: title, desc: desc, link: gUrl,
      img_url: 'https://ccz17683994700-del.github.io/vatti-inspection-report/favicon.ico',
      img_width: '64', img_height: '64'
    }, function() { toast('✅ 已发送'); });
    return;
  }
  
  // 方式3: 兜底复制
  copyUrl();
  toast('📋 链接已复制，请粘贴到微信发送');
}

// ===== CONSUMER REPORT =====
var rCurrentTab = 'problem';

function showReport(d) {
  document.getElementById('editMode').classList.add('hidden');
  document.getElementById('resultModal').classList.add('hidden');
  document.getElementById('reportView').classList.remove('hidden');
  document.getElementById('headerSub').textContent = '厨房健康报告';

  // Greeting
  var cm = d.c.cm || '业主';
  document.getElementById('rGreeting').textContent = '尊敬的 '+esc(cm)+'，您好：这是本次厨房健康诊断报告';
  document.getElementById('rDate').textContent = '检测时间：' + (d.c.dt || '');

  // Count problems
  var problems = [];
  GKEYS.forEach(function(gk) {
    var gr = G[gk], dk = {gas:'g',elec:'e',water:'w',smoke:'s',wqual:'q'}[gk], dd = d[dk];
    if (!dd) return;
    gr.items.forEach(function(item) {
      var val = dd[item.id];
      if (val === undefined) return;
      var isBad = false;
      if (item.type === 'yn' || item.type === 'yn2' || item.type === 'pipe' || item.type === 'year') isBad = (val === 'bad');
      else if (item.type === 'level') {
        var lv = val;
        if (item.bad && typeof item.bad === 'number') isBad = (lv >= item.bad);
        else if (item.bad && typeof item.bad === 'string') {
          var badIdx = item.levels.indexOf(item.bad);
          isBad = (lv >= badIdx && badIdx >= 0);
        }
      } else if (item.type === 'cl') {
        isBad = (parseFloat(val) >= 0.6);
      }
      if (isBad) problems.push({gk:gk, item:item, val:val, dd:dd});
    });
  });

  document.getElementById('rIssueCount').textContent = '本次为您检测出 ' + problems.length + ' 处问题';

  // Render tabs
  rCurrentTab = 'problem';
  document.getElementById('tabProblem').classList.add('active');
  document.getElementById('tabFull').classList.remove('active');
  renderTab(d, problems);
}

function switchTab(tab) {
  rCurrentTab = tab;
  document.getElementById('tabProblem').classList.toggle('active', tab==='problem');
  document.getElementById('tabFull').classList.toggle('active', tab==='full');
  renderTab(gData, []);
}

function renderTab(d, problems) {
  if (!d) return;
  var html = '';

  if (rCurrentTab === 'problem') {
    // Recalculate problems
    var probs = [];
    GKEYS.forEach(function(gk) {
      var gr = G[gk], dk = {gas:'g',elec:'e',water:'w',smoke:'s',wqual:'q'}[gk], dd = d[dk];
      if (!dd) return;
      gr.items.forEach(function(item) {
        var val = dd[item.id];
        if (val === undefined) return;
        var isBad = false;
        if (item.type === 'yn' || item.type === 'yn2' || item.type === 'pipe' || item.type === 'year') isBad = (val === 'bad');
        else if (item.type === 'level') {
          var lv = val;
          if (item.bad && typeof item.bad === 'number') isBad = (lv >= item.bad);
          else if (item.bad && typeof item.bad === 'string') {
            var badIdx = item.levels.indexOf(item.bad);
            isBad = (lv >= badIdx && badIdx >= 0);
          }
        } else if (item.type === 'cl') {
          isBad = (parseFloat(val) >= 0.6);
        }
        if (isBad) probs.push({gk:gk, item:item, val:val, dd:dd});
      });
    });

    if (probs.length === 0) {
      html += '<div class="r-section"><div style="text-align:center;padding:40px 20px;color:var(--green)"><div style="font-size:48px">✅</div><div style="font-size:16px;font-weight:700;margin-top:8px">恭喜！未发现问题</div><div style="font-size:12px;color:var(--gray-light);margin-top:4px">您的厨房各项指标均正常</div></div></div>';
    } else {
      probs.forEach(function(prob, pi) {
        var item = prob.item, val = prob.val, dd = prob.dd;
        html += '<div class="r-section"><div class="problem-item"><div class="problem-bar"><div class="p-num">'+(pi+1)+'</div><div class="p-text">'+esc(getProblemDesc(item, val, dd))+'</div></div>';
        // Only show measurement/normal-range for non yes/no types
        if (item.type !== 'yn' && item.type !== 'yn2' && item.type !== 'pipe' && item.type !== 'year') {
          html += '<div class="problem-detail">';
          html += '<div class="problem-metric"><div class="m-label">测量值</div><div class="m-value bad">'+esc(getMeasureVal(item, val, dd))+'</div></div>';
          html += '<div class="problem-metric"><div class="m-label">正常区间</div><div class="m-value good">'+esc(getNormalRange(item))+'</div></div>';
          html += '</div>';
        }
        html += '</div></div>';
      });
    }

    // Suggestions
    if (d.sg && d.sg.length > 0) {
      html += '<div class="r-section"><div class="r-section-title">🔧 整改建议</div>';
      d.sg.forEach(function(sg) {
        var rt = ['低','中','高'], rc = ['low','mid','high'];
        html += '<div class="sg-card"><div class="risk-tag '+rc[sg.r]+'">'+rt[sg.r]+'风险</div><div class="sg-title">'+esc(sg.p)+'</div>';
        if (sg.pr) html += '<div class="sg-product">💡 '+esc(sg.pr)+'</div>';
        html += '</div>';
      });
      html += '</div>';
    }
  } else {
    // Full report
    GKEYS.forEach(function(gk) {
      var gr = G[gk], dk = {gas:'g',elec:'e',water:'w',smoke:'s',wqual:'q'}[gk], dd = d[dk];
      if (!dd) return;
      html += '<div class="r-section"><div class="r-section-title">'+gr.icon+' '+gr.title+'</div>';
      gr.items.forEach(function(item) {
        var val = dd[item.id];
        if (val === undefined) return;
        var isBad = false;
        if (item.type === 'yn' || item.type === 'yn2' || item.type === 'pipe' || item.type === 'year') isBad = (val === 'bad');
        else if (item.type === 'level') {
          var lv = val;
          if (item.bad && typeof item.bad === 'number') isBad = (lv >= item.bad);
          else if (item.bad && typeof item.bad === 'string') {
            var badIdx = item.levels.indexOf(item.bad);
            isBad = (lv >= badIdx && badIdx >= 0);
          }
        } else if (item.type === 'cl') {
          isBad = (parseFloat(val) >= 0.6);
        }
        var mVal = getMeasureVal(item, val, dd);
        html += '<div class="normal-item"><div class="ni-status '+(isBad?'bad':'ok')+'"></div><div class="ni-name">'+esc(item.name)+'</div><div class="ni-value">'+esc(mVal)+(item.unit?' '+item.unit:'')+'</div><div class="ni-badge '+(isBad?'bad':'ok')+'">'+(isBad?'异常':'正常')+'</div></div>';
      });
      html += '</div>';
    });
  }

  // Services - check if any are done (from the old format, not applicable here)
  // Store info
  if (d.st && d.st.n) {
    html += '<div class="r-section"><div class="r-section-title">🏪 服务门店</div><div class="store-card">';
    if (d.st.n) html += '<div><span class="sc-label">门店</span>'+esc(d.st.n)+'</div>';
    if (d.st.p) html += '<div><span class="sc-label">电话</span>'+esc(d.st.p)+'</div>';
    if (d.c.st) html += '<div><span class="sc-label">安检员</span>'+esc(d.c.st)+'</div>';
    html += '</div></div>';
  }

  document.getElementById('rContent').innerHTML = html;
}

function getMeasureVal(item, val, dd) {
  if (item.type === 'yn' || item.type === 'yn2') {
    var reason = dd[item.id+'_r'] || '';
    if (val === 'bad') return reason || (item.labelBad || '异常');
    return item.labelOk || '正常';
  }
  if (item.type === 'pipe') return val === 'bad' ? '橡胶管/老化' : '不锈钢波纹管';
  if (item.type === 'year') return val === 'bad' ? '超过国家报废年限' : '未超国家报废年限';
  if (item.type === 'val') return val || '未检测';
  if (item.type === 'num') {
    var vv = dd[item.id+'_val'];
    return vv || (val === 'bad' ? '异常' : '正常');
  }
  if (item.type === 'level') return dd[item.id+'_label'] || item.levels[val] || '';
  if (item.type === 'cl') return val || '';
  return val || '';
}

function getNormalRange(item) {
  if (item.type === 'yn' || item.type === 'yn2') return item.labelOk || '否';
  if (item.type === 'pipe') return '不锈钢波纹管';
  if (item.type === 'num') return (item.bad ? '< ' + item.bad + ' ' + (item.unit||'') : '正常范围');
  if (item.type === 'level') return item.bad || item.levels[0];
  if (item.type === 'cl') return '< 0.6';
  return '正常';
}

function getProblemDesc(item, val, dd) {
  var mv = getMeasureVal(item, val, dd);
  var reason = dd[item.id+'_r'] || '';
  if (item.type === 'yn' || item.type === 'yn2') {
    var desc = reason ? item.name + '存在' + reason : item.name + '：' + item.q.replace('？','') + '，检测结果：' + mv;
    return desc;
  }
  if (item.type === 'year') return item.name + '：' + mv;
  if (item.type === 'num') {
    var vv = dd[item.id+'_val'];
    return (item.note || item.q) + '（当前：' + (vv || '异常') + (item.unit||'') + '，建议' + (item.bad||'') + (item.unit||'') + '以内）';
  }
  if (item.type === 'level') return item.name + '：' + item.q.replace('？','') + '：' + mv;
  if (item.type === 'pipe') return item.name + '：燃气软管为' + mv + '，建议更换不锈钢波纹管';
  if (item.type === 'cl') return item.name + '：氯离子含量：' + val + '，建议 < 0.6';
  if (item.type === 'val') return item.name + '：' + mv + (item.unit?' '+item.unit:'');
  return item.name + '：' + item.q;
}

// ===== HASH =====
function checkHash() {
  var hash = window.location.hash;
  if (hash.indexOf('#data=') === 0) {
    try {
      var json = LZString.decompressFromBase64(hash.substring(6)), d = JSON.parse(json);
      if (d && d.v) { gData = d; showReport(d); }
    } catch(e) {}
  }
}

// ===== HISTORY =====
var HIST_KEY = 'vatti_inspect_history';

function saveHistory(d, url) {
  var problems = [];
  GKEYS.forEach(function(gk) {
    var gr = G[gk], dk = {gas:'g',elec:'e',water:'w',smoke:'s',wqual:'q'}[gk], dd = d[dk];
    if (!dd) return;
    gr.items.forEach(function(item) {
      var val = dd[item.id];
      if (val === undefined) return;
      var isBad = false;
      if (item.type === 'yn' || item.type === 'yn2' || item.type === 'pipe' || item.type === 'year') isBad = (val === 'bad');
      else if (item.type === 'level') {
        var lv = val;
        if (item.bad && typeof item.bad === 'number') isBad = (lv >= item.bad);
        else if (item.bad && typeof item.bad === 'string') { var badIdx = item.levels.indexOf(item.bad); isBad = (lv >= badIdx && badIdx >= 0); }
      } else if (item.type === 'cl') isBad = (parseFloat(val) >= 0.6);
      if (isBad) problems.push(item.name);
    });
  });
  var entry = {
    t: new Date().toISOString(),
    n: d.c.n || '',
    p: d.c.p || '',
    cm: d.c.cm || '',
    st: d.st.n || '',
    staff: d.c.st || '',
    dt: d.c.dt || '',
    pc: problems.length,
    pp: problems.slice(0,5).join('、'),
    url: url
  };
  var hist = [];
  try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}
  hist.unshift(entry);
  if (hist.length > 100) hist = hist.slice(0, 100);
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  renderHistory();
}

function renderHistory() {
  var hist = []; try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}
  var card = document.getElementById('historyCard');
  var list = document.getElementById('historyList');
  if (!hist.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  var html = '';
  hist.forEach(function(h, i) {
    var d = h.dt || h.t.substring(0,10);
    var label = h.n || h.p || '未知客户';
    html += '<div class="history-item" onclick="reopenHistory('+i+')">';
    html += '<div class="hi-top"><span class="hi-name">'+esc(label)+'</span><span class="hi-date">'+esc(d)+'</span></div>';
    html += '<div class="hi-meta">';
    if (h.st) html += esc(h.st) + ' | ';
    html += '检出 <span class="hi-badge '+(h.pc>0?'issue':'ok')+'">'+(h.pc>0?h.pc+'处问题':'正常')+'</span>';
    if (h.pp) html += ' <span style="font-size:10px;color:var(--gray-light)">'+esc(h.pp)+'</span>';
    html += '</div></div>';
  });
  list.innerHTML = html;
}

function reopenHistory(i) {
  var hist = []; try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}
  if (hist[i] && hist[i].url) {
    window.open(hist[i].url, '_blank');
  }
}

function exportHistory() {
  var hist = []; try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}
  if (!hist.length) { toast('暂无历史记录'); return; }
  var csv = '\uFEFF客户称呼,电话,小区,门店,安检员,日期,问题数,问题摘要,报告链接\n';
  hist.forEach(function(h) {
    csv += [esc(h.n), esc(h.p), esc(h.cm), esc(h.st), esc(h.staff), esc(h.dt||h.t.substring(0,10)), h.pc, esc(h.pp||''), h.url].join(',') + '\n';
  });
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '华帝安检记录_' + new Date().toISOString().substring(0,10) + '.csv';
  a.click(); toast('✅ 已导出CSV');
}

function clearHistory() {
  if (confirm('确定清空本设备所有发送记录？此操作不可恢复。')) {
    localStorage.removeItem(HIST_KEY);
    renderHistory();
    toast('已清空');
  }
}

// ===== HELPERS =====
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function toast(msg) { var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000); }
function shareReport() {
  if (navigator.share) { navigator.share({title:'华帝厨房健康诊断报告',url:window.location.href}); }
  else { var url = window.location.href; copyUrl(); }
}

window.addEventListener('DOMContentLoaded', init);
window.addEventListener('hashchange', checkHash);
</script>
