<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>华帝厨房电器安检报告</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --red: #C41E3A;
  --red-light: #FFF5F5;
  --green: #2E7D32;
  --green-light: #E8F5E9;
  --orange: #E67E22;
  --orange-light: #FFF8F0;
  --dark: #1a1a1a;
  --gray: #666;
  --gray-light: #999;
  --bg: #f5f5f5;
  --card: #fff;
  --border: #e8e8e8;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--dark);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ===== Header ===== */
.header {
  background: linear-gradient(135deg, #C41E3A 0%, #a01830 100%);
  color: #fff;
  padding: 20px 16px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header .brand { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
.header .sub { font-size: 11px; opacity: 0.75; margin-top: 2px; }

/* ===== Container ===== */
.container { max-width: 600px; margin: 0 auto; padding: 0 12px 40px; }

/* ===== Cards ===== */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 12px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--red);
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title .icon { font-size: 18px; }

/* ===== Form ===== */
.form-group { margin-bottom: 10px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--gray);
  margin-bottom: 4px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.2s;
  background: #fafafa;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--red);
  background: #fff;
}
.form-row { display: flex; gap: 8px; }
.form-row .form-group { flex:1; }

/* ===== Check Items ===== */
.check-item {
  display: flex;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.check-item:last-child { border-bottom: none; }
.check-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #f0f0f0;
  color: var(--gray);
  font-size: 11px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.check-info { flex: 1; min-width: 0; }
.check-name { font-size: 13px; font-weight: 600; color: var(--dark); }
.check-desc { font-size: 11px; color: var(--gray-light); margin-top: 1px; }
.check-result { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.check-result label {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 14px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #fff;
  transition: all 0.2s;
  white-space: nowrap;
}
.check-result input { display: none; }
.check-result input:checked + label.pass { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 600; }
.check-result input:checked + label.fail { background: #FFEBEE; border-color: var(--red); color: var(--red); font-weight: 600; }
.check-result input:checked + label.skip { background: #f5f5f5; border-color: #ccc; color: #999; }

.check-note {
  width: 100%;
  margin-top: 4px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  display: none;
}
.check-item.has-issue .check-note { display: block; }

/* ===== Buttons ===== */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  margin-top: 16px;
}
.btn-primary { background: var(--red); color: #fff; }
.btn-primary:active { background: #a01830; transform: scale(0.98); }
.btn-outline {
  background: #fff;
  color: var(--red);
  border: 2px solid var(--red);
  margin-top: 8px;
}

/* ===== Report View ===== */
.report-view { display: none; }
.report-view.active { display: block; }

.result-banner {
  text-align: center;
  padding: 24px 16px;
  border-radius: var(--radius);
  margin-top: 12px;
  color: #fff;
}
.result-banner.safe { background: linear-gradient(135deg, #2E7D32, #43A047); }
.result-banner.warning { background: linear-gradient(135deg, #E67E22, #F5A623); }
.result-banner.danger { background: linear-gradient(135deg, #C41E3A, #E53935); }
.result-banner .big-icon { font-size: 48px; margin-bottom: 8px; }
.result-banner .big-title { font-size: 20px; font-weight: 700; }
.result-banner .big-sub { font-size: 13px; opacity: 0.85; margin-top: 4px; }

.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}
.summary-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px;
  text-align: center;
  box-shadow: var(--shadow);
}
.summary-item .s-label { font-size: 11px; color: var(--gray-light); }
.summary-item .s-value { font-size: 16px; font-weight: 700; margin-top: 4px; }
.summary-item .s-value.red { color: var(--red); }
.summary-item .s-value.green { color: var(--green); }
.summary-item .s-value.orange { color: var(--orange); }

.report-section { margin-top: 12px; }
.report-section h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 8px;
  padding-left: 10px;
  border-left: 3px solid var(--red);
}

.report-check-item {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  margin-bottom: 4px;
  border-radius: 8px;
  gap: 8px;
  font-size: 13px;
  background: #fafafa;
}
.report-check-item.issue {
  background: #FFEBEE;
  border: 1px solid #FFCDD2;
}
.report-check-item .status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.report-check-item .status-dot.pass { background: var(--green); }
.report-check-item .status-dot.fail { background: var(--red); }
.report-check-item .status-dot.skip { background: #ccc; }
.report-check-item .item-name { flex: 1; }
.report-check-item .item-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  flex-shrink: 0;
}
.item-badge.pass { background: var(--green-light); color: var(--green); }
.item-badge.fail { background: #FFEBEE; color: var(--red); }
.item-badge.skip { background: #f0f0f0; color: var(--gray-light); }

.suggestion-card {
  background: #FFF8F0;
  border: 1px solid #FFE0B2;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}
.suggestion-card .risk-tag {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 700;
  margin-bottom: 4px;
}
.risk-tag.high { background: #FFEBEE; color: var(--red); }
.risk-tag.mid { background: #FFF8F0; color: var(--orange); }
.risk-tag.low { background: #E8F5E9; color: var(--green); }
.suggestion-card .sg-problem { font-size: 13px; font-weight: 600; color: var(--dark); }
.suggestion-card .sg-fix { font-size: 12px; color: var(--gray); margin-top: 4px; }
.suggestion-card .sg-product { font-size: 11px; color: var(--red); margin-top: 2px; }

.store-info {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 12px;
  box-shadow: var(--shadow);
  font-size: 12px;
  color: var(--gray);
}
.store-info .si-row { display: flex; margin-bottom: 2px; }
.store-info .si-label { width: 60px; flex-shrink: 0; color: var(--gray-light); }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 12px 24px; border-radius: 25px;
  font-size: 14px; font-weight: 600; z-index: 9999;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ===== Mode Toggle ===== */
.mode-switch {
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 3px;
  max-width: 260px;
  margin: 12px auto 0;
}
.mode-switch button {
  flex: 1;
  padding: 6px 14px;
  border: none;
  border-radius: 18px;
  font-size: 12px;
  cursor: pointer;
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-family: inherit;
  font-weight: 600;
  transition: all 0.2s;
}
.mode-switch button.active { background: #fff; color: var(--red); }

/* ===== Loading ===== */
.loading {
  text-align: center; padding: 60px 20px; color: var(--gray);
}
.loading .spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Empty state ===== */
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--gray-light);
}
.empty-state .empty-icon { font-size: 48px; }

/* Responsive */
@media (max-width: 400px) {
  .check-result { gap: 4px; }
  .check-result label { padding: 3px 8px; font-size: 10px; }
  .summary-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header" id="header">
  <div class="brand">华帝 VATTI</div>
  <div class="sub" id="headerSub">厨房电器上门安检</div>
  <div class="mode-switch" id="modeSwitch" style="display:none">
    <button id="btnEditMode" class="active" onclick="switchMode('edit')">📝 填写报告</button>
    <button id="btnViewMode" onclick="switchMode('view')">📋 预览报告</button>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<div class="container">

<!-- ============================================ -->
<!-- EDIT MODE (门店填写) -->
<!-- ============================================ -->
<div id="editMode">

  <!-- 客户信息 -->
  <div class="card">
    <div class="card-title"><span class="icon">👤</span> 客户基本信息</div>
    <div class="form-row">
      <div class="form-group"><label>客户姓名 *</label><input id="cName" placeholder="先生/女士"></div>
      <div class="form-group"><label>联系电话 *</label><input id="cPhone" type="tel" placeholder="手机号"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>预约日期</label><input id="cDate" type="date"></div>
      <div class="form-group"><label>所在城市</label><input id="cCity" placeholder="如：广州"></div>
    </div>
    <div class="form-group"><label>服务地址</label><input id="cAddr" placeholder="小区/楼栋/房号"></div>
    <div class="form-row">
      <div class="form-group"><label>气源类型</label><select id="cGas"><option value="">请选择</option><option>天然气</option><option>液化气</option><option>管道煤气</option></select></div>
      <div class="form-group"><label>用户来源</label><select id="cSource"><option value="">请选择</option><option>主动预约</option><option>门店邀约</option><option>老客回访</option><option>其他</option></select></div>
    </div>
  </div>

  <!-- 设备清单 -->
  <div class="card">
    <div class="card-title"><span class="icon">📋</span> 厨房电器设备清单</div>
    <div id="deviceList"></div>
    <button class="btn btn-outline" style="margin-top:8px;padding:10px" onclick="addDevice()">+ 添加设备</button>
  </div>

  <!-- 燃气灶检查 -->
  <div class="card" id="stoveSection">
    <div class="card-title"><span class="icon">🔥</span> 燃气灶安全检查</div>
    <div id="stoveChecks"></div>
  </div>

  <!-- 吸油烟机检查 -->
  <div class="card" id="hoodSection">
    <div class="card-title"><span class="icon">💨</span> 吸油烟机安全检查</div>
    <div id="hoodChecks"></div>
  </div>

  <!-- 燃气热水器检查 -->
  <div class="card" id="waterSection">
    <div class="card-title"><span class="icon">🚿</span> 燃气热水器安全检查</div>
    <div id="waterChecks"></div>
  </div>

  <!-- 燃气安全专项 -->
  <div class="card" id="gasSection">
    <div class="card-title"><span class="icon">⚠️</span> 燃气安全专项检测</div>
    <div id="gasChecks"></div>
  </div>

  <!-- 电气安全 -->
  <div class="card" id="elecSection">
    <div class="card-title"><span class="icon">⚡</span> 电气安全检测</div>
    <div id="elecChecks"></div>
  </div>

  <!-- 综合结论 -->
  <div class="card">
    <div class="card-title"><span class="icon">📊</span> 综合检测结论</div>
    <div class="form-group"><label>燃气安全</label><select id="clGas"><option value="0">安全</option><option value="1">有隐患</option></select></div>
    <div class="form-group"><label>电气安全</label><select id="clElec"><option value="0">安全</option><option value="1">有隐患</option></select></div>
    <div class="form-group"><label>设备运行状态</label><select id="clDev"><option value="0">良好</option><option value="1">一般</option><option value="2">需维修</option></select></div>
    <div class="form-group"><label>使用环境</label><select id="clEnv"><option value="0">合规</option><option value="1">需改善</option></select></div>
    <div class="form-group"><label>总体结论</label><select id="clOverall">
      <option value="0">整体安全，可正常使用</option>
      <option value="1">存在隐患，建议整改后使用</option>
      <option value="2">存在严重隐患，建议立即停用并整改</option>
      <option value="3">设备超期服役，建议以旧换新</option>
    </select></div>
    <div class="form-group"><label>风险等级</label><select id="clRisk"><option value="0">正常（绿色）</option><option value="1">预警（橙色）</option><option value="2">危险（红色）</option></select></div>
  </div>

  <!-- 整改建议 -->
  <div class="card">
    <div class="card-title"><span class="icon">🔧</span> 整改建议</div>
    <div id="suggestionList"></div>
    <button class="btn btn-outline" style="margin-top:8px;padding:10px" onclick="addSuggestion()">+ 添加整改建议</button>
  </div>

  <!-- 增值服务 -->
  <div class="card">
    <div class="card-title"><span class="icon">⭐</span> 增值服务（可多选）</div>
    <div id="serviceChecks"></div>
  </div>

  <!-- 门店信息 -->
  <div class="card">
    <div class="card-title"><span class="icon">🏪</span> 门店信息</div>
    <div class="form-row">
      <div class="form-group"><label>门店名称</label><input id="sName" placeholder="门店名称"></div>
      <div class="form-group"><label>门店编码</label><input id="sCode" placeholder="编码"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>服务电话</label><input id="sPhone" type="tel" placeholder="门店电话"></div>
      <div class="form-group"><label>门店地址</label><input id="sAddr" placeholder="地址"></div>
    </div>
    <div class="form-group"><label>安检员姓名</label><input id="inspName" placeholder="安检员"></div>
  </div>

  <!-- 生成按钮 -->
  <button class="btn btn-primary" onclick="generateReport()" id="btnGenerate">📱 生成消费者检测报告链接</button>
  <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--gray-light)">
    填写完成后点击生成链接，复制发送给消费者
  </div>
</div>

<!-- ============================================ -->
<!-- VIEW MODE (消费者查看报告) -->
<!-- ============================================ -->
<div id="viewMode" class="report-view">
  <div id="reportContent"></div>
</div>

<!-- ============================================ -->
<!-- RESULT MODAL (链接生成结果) -->
<!-- ============================================ -->
<div id="resultModal" class="report-view">
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin:10px 0">✅</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:8px">检测报告已生成</div>
    <div style="font-size:12px;color:var(--gray);margin-bottom:12px">复制以下链接发送给消费者即可查看</div>
    <div style="background:#f5f5f5;padding:12px;border-radius:8px;word-break:break-all;font-size:12px;color:var(--dark);text-align:left;max-height:120px;overflow-y:auto" id="reportUrl"></div>
    <button class="btn btn-primary" onclick="copyUrl()" style="margin-top:10px">📋 复制链接</button>
    <button class="btn btn-outline" onclick="previewReport()">👁️ 预览报告</button>
    <button class="btn btn-outline" onclick="backToEdit()">↩ 返回修改</button>
  </div>
</div>

</div><!-- /container -->

<script>
// ===== LZString 精简实现 =====
var LZString = (function() {
  var f = String.fromCharCode;
  var keyStrBase64 = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";
  var baseReverseDic = {};
  
  function _compress(uncompressed, bitsPerChar, getCharFromInt) {
    if (uncompressed === null) return "";
    var i, value, context_dictionary = {}, context_dictionaryToCreate = {},
        context_c = "", context_wc = "", context_w = "", context_enlargeIn = 2,
        context_dictSize = 3, context_numBits = 2,
        context_data = [], context_data_val = 0, context_data_position = 0, ii;
    for (ii = 0; ii < uncompressed.length; ii++) {
      context_c = uncompressed.charAt(ii);
      if (!Object.prototype.hasOwnProperty.call(context_dictionary, context_c)) {
        context_dictionary[context_c] = context_dictSize++;
        context_dictionaryToCreate[context_c] = true;
      }
      context_wc = context_w + context_c;
      if (Object.prototype.hasOwnProperty.call(context_dictionary, context_wc)) {
        context_w = context_wc;
      } else {
        if (Object.prototype.hasOwnProperty.call(context_dictionaryToCreate, context_w)) {
          if (context_w.charCodeAt(0) < 256) {
            for (i = 0; i < context_numBits; i++) {
              context_data_val = (context_data_val << 1);
              if (context_data_position == bitsPerChar - 1) {
                context_data_position = 0;
                context_data.push(getCharFromInt(context_data_val));
                context_data_val = 0;
              } else { context_data_position++; }
            }
            value = context_w.charCodeAt(0);
            for (i = 0; i < 8; i++) {
              context_data_val = (context_data_val << 1) | (value & 1);
              if (context_data_position == bitsPerChar - 1) {
                context_data_position = 0;
                context_data.push(getCharFromInt(context_data_val));
                context_data_val = 0;
              } else { context_data_position++; }
              value = value >> 1;
            }
          } else {
            value = 1;
            for (i = 0; i < context_numBits; i++) {
              context_data_val = (context_data_val << 1) | value;
              if (context_data_position == bitsPerChar - 1) {
                context_data_position = 0;
                context_data.push(getCharFromInt(context_data_val));
                context_data_val = 0;
              } else { context_data_position++; }
              value = 0;
            }
            value = context_w.charCodeAt(0);
            for (i = 0; i < 16; i++) {
              context_data_val = (context_data_val << 1) | (value & 1);
              if (context_data_position == bitsPerChar - 1) {
                context_data_position = 0;
                context_data.push(getCharFromInt(context_data_val));
                context_data_val = 0;
              } else { context_data_position++; }
              value = value >> 1;
            }
          }
          context_enlargeIn--;
          if (context_enlargeIn == 0) { context_enlargeIn = Math.pow(2, context_numBits); context_numBits++; }
          delete context_dictionaryToCreate[context_w];
        } else {
          value = context_dictionary[context_w];
          for (i = 0; i < context_numBits; i++) {
            context_data_val = (context_data_val << 1) | (value & 1);
            if (context_data_position == bitsPerChar - 1) {
              context_data_position = 0;
              context_data.push(getCharFromInt(context_data_val));
              context_data_val = 0;
            } else { context_data_position++; }
            value = value >> 1;
          }
        }
        context_enlargeIn--;
        if (context_enlargeIn == 0) { context_enlargeIn = Math.pow(2, context_numBits); context_numBits++; }
        context_dictionary[context_wc] = context_dictSize++;
        context_w = String(context_c);
      }
    }
    if (context_w !== "") {
      if (Object.prototype.hasOwnProperty.call(context_dictionaryToCreate, context_w)) {
        if (context_w.charCodeAt(0) < 256) {
          for (i = 0; i < context_numBits; i++) {
            context_data_val = (context_data_val << 1);
            if (context_data_position == bitsPerChar - 1) {
              context_data_position = 0;
              context_data.push(getCharFromInt(context_data_val));
              context_data_val = 0;
            } else { context_data_position++; }
          }
          value = context_w.charCodeAt(0);
          for (i = 0; i < 8; i++) {
            context_data_val = (context_data_val << 1) | (value & 1);
            if (context_data_position == bitsPerChar - 1) {
              context_data_position = 0;
              context_data.push(getCharFromInt(context_data_val));
              context_data_val = 0;
            } else { context_data_position++; }
            value = value >> 1;
          }
        } else {
          value = 1;
          for (i = 0; i < context_numBits; i++) {
            context_data_val = (context_data_val << 1) | value;
            if (context_data_position == bitsPerChar - 1) {
              context_data_position = 0;
              context_data.push(getCharFromInt(context_data_val));
              context_data_val = 0;
            } else { context_data_position++; }
            value = 0;
          }
          value = context_w.charCodeAt(0);
          for (i = 0; i < 16; i++) {
            context_data_val = (context_data_val << 1) | (value & 1);
            if (context_data_position == bitsPerChar - 1) {
              context_data_position = 0;
              context_data.push(getCharFromInt(context_data_val));
              context_data_val = 0;
            } else { context_data_position++; }
            value = value >> 1;
          }
        }
        context_enlargeIn--;
        if (context_enlargeIn == 0) { context_enlargeIn = Math.pow(2, context_numBits); context_numBits++; }
        delete context_dictionaryToCreate[context_w];
      } else {
        value = context_dictionary[context_w];
        for (i = 0; i < context_numBits; i++) {
          context_data_val = (context_data_val << 1) | (value & 1);
          if (context_data_position == bitsPerChar - 1) {
            context_data_position = 0;
            context_data.push(getCharFromInt(context_data_val));
            context_data_val = 0;
          } else { context_data_position++; }
          value = value >> 1;
        }
      }
      context_enlargeIn--;
      if (context_enlargeIn == 0) { context_enlargeIn = Math.pow(2, context_numBits); context_numBits++; }
    }
    value = 2;
    for (i = 0; i < context_numBits; i++) {
      context_data_val = (context_data_val << 1) | (value & 1);
      if (context_data_position == bitsPerChar - 1) {
        context_data_position = 0;
        context_data.push(getCharFromInt(context_data_val));
        context_data_val = 0;
      } else { context_data_position++; }
      value = value >> 1;
    }
    while (true) {
      context_data_val = (context_data_val << 1);
      if (context_data_position == bitsPerChar - 1) {
        context_data.push(getCharFromInt(context_data_val));
        break;
      } else context_data_position++;
    }
    return context_data.join('');
  }

  function _decompress(length, resetValue, getNextValue) {
    var dictionary = [], enlargeIn = 4, dictSize = 4, numBits = 3, entry = "", result = [],
        w, bits, resb, maxpower, power, c, data = {val: getNextValue(0), position: resetValue, index: 1};
    for (var i = 0; i < 3; i += 1) dictionary[i] = i;
    bits = 0; maxpower = Math.pow(2, 2); power = 1;
    while (power != maxpower) {
      resb = data.val & data.position;
      data.position >>= 1;
      if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); }
      bits |= (resb > 0 ? 1 : 0) * power;
      power <<= 1;
    }
    switch (bits) {
      case 0: bits = 0; maxpower = Math.pow(2, 8); power = 1;
        while (power != maxpower) {
          resb = data.val & data.position;
          data.position >>= 1;
          if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); }
          bits |= (resb > 0 ? 1 : 0) * power;
          power <<= 1;
        }
        c = f(bits); break;
      case 1: bits = 0; maxpower = Math.pow(2, 16); power = 1;
        while (power != maxpower) {
          resb = data.val & data.position;
          data.position >>= 1;
          if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); }
          bits |= (resb > 0 ? 1 : 0) * power;
          power <<= 1;
        }
        c = f(bits); break;
      case 2: return "";
    }
    dictionary[3] = c; w = c; result.push(c);
    while (true) {
      if (data.index > length) return "";
      bits = 0; maxpower = Math.pow(2, numBits); power = 1;
      while (power != maxpower) {
        resb = data.val & data.position;
        data.position >>= 1;
        if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); }
        bits |= (resb > 0 ? 1 : 0) * power;
        power <<= 1;
      }
      switch (c = bits) {
        case 0: bits = 0; maxpower = Math.pow(2, 8); power = 1;
          while (power != maxpower) {
            resb = data.val & data.position;
            data.position >>= 1;
            if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); }
            bits |= (resb > 0 ? 1 : 0) * power;
            power <<= 1;
          }
          dictionary[dictSize++] = f(bits); c = dictSize - 1; enlargeIn--; break;
        case 1: bits = 0; maxpower = Math.pow(2, 16); power = 1;
          while (power != maxpower) {
            resb = data.val & data.position;
            data.position >>= 1;
            if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); }
            bits |= (resb > 0 ? 1 : 0) * power;
            power <<= 1;
          }
          dictionary[dictSize++] = f(bits); c = dictSize - 1; enlargeIn--; break;
        case 2: return result.join('');
      }
      if (enlargeIn == 0) { enlargeIn = Math.pow(2, numBits); numBits++; }
      if (dictionary[c]) { entry = dictionary[c]; } else {
        if (c === dictSize) { entry = w + w.charAt(0); } else { return null; }
      }
      result.push(entry);
      dictionary[dictSize++] = w + entry.charAt(0);
      enlargeIn--;
      w = entry;
      if (enlargeIn == 0) { enlargeIn = Math.pow(2, numBits); numBits++; }
    }
  }

  return {
    compressToBase64: function(input) {
      if (input === null) return "";
      var res = _compress(input, 6, function(a) { return keyStrBase64.charAt(a); });
      switch (res.length % 4) {
        case 0: return res;
        case 1: return res + "===";
        case 2: return res + "==";
        case 3: return res + "=";
      }
    },
    decompressFromBase64: function(input) {
      if (input === null) return "";
      if (input === "") return null;
      return _decompress(input.length, 32, function(index) { return baseReverseDic[input.charAt(index)]; });
    }
  };
})();

function collectData() {
  var data = { v: 1, c: {}, s: {}, h: {}, w: {}, g: {}, e: {}, cl: {}, sg: [], sv: [], st: {}, insp: {} };
  
  data.c.n = document.getElementById('cName').value.trim();
  data.c.p = document.getElementById('cPhone').value.trim();
  data.c.d = document.getElementById('cDate').value;
  data.c.ct = document.getElementById('cCity').value.trim();
  data.c.a = document.getElementById('cAddr').value.trim();
  data.c.gas = document.getElementById('cGas').value;
  data.c.src = document.getElementById('cSource').value;
  
  data.dev = [];
  document.querySelectorAll('#deviceList .form-row').forEach(function(row) {
    var type = row.querySelector('.devType').value;
    var brand = row.querySelector('.devBrand').value.trim();
    var model = row.querySelector('.devModel').value.trim();
    var year = row.querySelector('.devYear').value.trim();
    if (type || brand || model || year) {
      data.dev.push([type, brand, model, year]);
    }
  });
  
  var groupFirsts = { stove: 's', hood: 'h', water: 'w', gas: 'g', elec: 'e' };
  for (var gkey in CHECK_GROUPS) {
    var group = CHECK_GROUPS[gkey];
    var dk = groupFirsts[gkey];
    data[dk] = {};
    group.items.forEach(function(item, idx) {
      var passRadio = document.getElementById(gkey + '_' + idx + '_pass');
      var failRadio = document.getElementById(gkey + '_' + idx + '_fail');
      var noteInput = document.getElementById(gkey + '_' + idx).querySelector('.check-note');
      var val = passRadio && passRadio.checked ? 0 : (failRadio && failRadio.checked ? 1 : -1);
      var note = noteInput ? noteInput.value.trim() : '';
      data[dk][idx] = val;
      if (note) data[dk]['n' + idx] = note;
    });
  }
  
  data.cl.gas = parseInt(document.getElementById('clGas').value);
  data.cl.elec = parseInt(document.getElementById('clElec').value);
  data.cl.dev = parseInt(document.getElementById('clDev').value);
  data.cl.env = parseInt(document.getElementById('clEnv').value);
  data.cl.overall = parseInt(document.getElementById('clOverall').value);
  data.cl.risk = parseInt(document.getElementById('clRisk').value);
  
  document.querySelectorAll('#suggestionList > div').forEach(function(div) {
    var problem = div.querySelector('.sgProblem').value.trim();
    var risk = div.querySelector('.sgRisk').value;
    var fix = div.querySelector('.sgFix').value.trim();
    var product = div.querySelector('.sgProduct').value.trim();
    if (problem || fix) {
      data.sg.push({ p: problem, r: parseInt(risk), f: fix, pr: product });
    }
  });
  
  SERVICES.forEach(function(svc, idx) {
    var cb = document.getElementById('svc_' + idx);
    if (cb && cb.checked) data.sv.push(idx);
  });
  
  data.st.n = document.getElementById('sName').value.trim();
  data.st.c = document.getElementById('sCode').value.trim();
  data.st.p = document.getElementById('sPhone').value.trim();
  data.st.a = document.getElementById('sAddr').value.trim();
  
  data.insp.n = document.getElementById('inspName').value.trim();
  data.insp.d = document.getElementById('cDate').value;
  
  return data;
}

    return;
  }
  
  generatedData = data;
  
  var json = JSON.stringify(data);
  var compressed = LZString.compressToBase64(json);
  var url = window.location.href.split('#')[0] + '#data=' + compressed;
  generatedUrl = url;
  
  document.getElementById('editMode').style.display = 'none';
  document.getElementById('viewMode').style.display = 'none';
  document.getElementById('resultModal').style.display = 'block';
  document.getElementById('reportUrl').textContent = url;
  document.getElementById('modeSwitch').style.display = 'none';
  document.getElementById('headerSub').textContent = '报告已生成';
  
  window.scrollTo(0, 0);
}

function copyUrl() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(generatedUrl).then(function() {
      showToast('✅ 链接已复制，可发送给消费者');
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = generatedUrl;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 链接已复制');
  }
}

  var bannerIcon = riskLevel == 2 ? '🔴' : (riskLevel == 1 ? '⚠️' : '✅');
  var bannerTitle = riskLevel == 2 ? '存在安全隐患' : (riskLevel == 1 ? '建议关注' : '检测通过');
  var overallTexts = ['整体安全，可正常使用', '存在隐患，建议整改后使用', '存在严重隐患，建议立即停用并整改', '设备超期服役，建议以旧换新'];
  var bannerSub = overallTexts[data.cl.overall] || '';
  
  html += '<div class="result-banner ' + bannerClass + '">';
  html += '<div class="big-icon">' + bannerIcon + '</div>';
  html += '<div class="big-title">' + bannerTitle + '</div>';
  html += '<div class="big-sub">' + bannerSub + '</div>';
  html += '</div>';
  
  var totalChecks = 0, failChecks = 0;
  var groupFirsts = { s: 'stove', h: 'hood', w: 'water', g: 'gas', e: 'elec' };
  
  for (var gk in groupFirsts) {
    var dk = groupFirsts[gk];
    var groupData = data[gk];
    if (!groupData) continue;
    var items = CHECK_GROUPS[dk].items;
    for (var i = 0; i < items.length; i++) {
      if (groupData[i] !== undefined && groupData[i] >= 0) {
        totalChecks++;
        if (groupData[i] == 1) failChecks++;
      }
    }
  }
  
  html += '<div class="summary-grid">';
  html += '<div class="summary-item"><div class="s-label">检测项目</div><div class="s-value">' + totalChecks + ' 项</div></div>';
  html += '<div class="summary-item"><div class="s-label">不通过</div><div class="s-value ' + (failChecks > 0 ? 'red' : 'green') + '">' + failChecks + ' 项</div></div>';
  if (data.c.n) html += '<div class="summary-item"><div class="s-label">客户</div><div class="s-value" style="font-size:13px">' + escapeHtml(data.c.n) + '</div></div>';
  if (data.c.d) html += '<div class="summary-item"><div class="s-label">日期</div><div class="s-value" style="font-size:13px">' + escapeHtml(data.c.d) + '</div></div>';
  html += '</div>';
  
  for (var gk in groupFirsts) {
    var dk = groupFirsts[gk];
    var groupData = data[gk];
    if (!groupData) continue;
    var group = CHECK_GROUPS[dk];
    var items = group.items;
    var hasAny = false;
    for (var i = 0; i < items.length; i++) { if (groupData[i] !== undefined && groupData[i] >= 0) { hasAny = true; break; } }
    if (!hasAny) continue;
    
    html += '<div class="report-section"><h3>' + group.icon + ' ' + group.title + '</h3>';
    for (var i = 0; i < items.length; i++) {
      if (groupData[i] === undefined || groupData[i] < 0) continue;
      var isFail = groupData[i] == 1;
      var note = groupData['n' + i] || '';
      html += '<div class="report-check-item' + (isFail ? ' issue' : '') + '">';
      html += '<div class="status-dot ' + (isFail ? 'fail' : 'pass') + '"></div>';
      html += '<div class="item-name">' + escapeHtml(items[i][0]) + '</div>';
      if (note) html += '<div style="font-size:10px;color:var(--gray)">' + escapeHtml(note) + '</div>';
      html += '<div class="item-badge ' + (isFail ? 'fail' : 'pass') + '">' + (isFail ? '不合格' : '合格') + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }
  
  if (data.sg && data.sg.length > 0) {
    html += '<div class="report-section"><h3>🔧 整改建议</h3>';
    data.sg.forEach(function(sg) {
      var riskTags = ['低', '中', '高'];
      var riskClasses = ['low', 'mid', 'high'];
      html += '<div class="suggestion-card">';
      html += '<div class="risk-tag ' + riskClasses[sg.r] + '">' + riskTags[sg.r] + '风险</div>';
      html += '<div class="sg-problem">' + escapeHtml(sg.p) + '</div>';
      html += '<div class="sg-fix">建议：' + escapeHtml(sg.f) + '</div>';
      if (sg.pr) html += '<div class="sg-product">推荐产品：' + escapeHtml(sg.pr) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }
  
  if (data.sv && data.sv.length > 0) {
    html += '<div class="report-section"><h3>⭐ 已执行增值服务</h3>';
    html += '<div class="card">';
    data.sv.forEach(function(idx) {
      html += '<div style="padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)">✓ ' + SERVICES[idx] + '</div>';
    });
    html += '</div></div>';
  }
  
  if (data.st.n) {
    html += '<div class="report-section"><h3>🏪 服务门店</h3>';
    html += '<div class="store-info">';
    if (data.st.n) html += '<div class="si-row"><span class="si-label">门店</span>' + escapeHtml(data.st.n) + '</div>';
    if (data.st.p) html += '<div class="si-row"><span class="si-label">电话</span>' + escapeHtml(data.st.p) + '</div>';
    if (data.st.a) html += '<div class="si-row"><span class="si-label">地址</span>' + escapeHtml(data.st.a) + '</div>';
    if (data.insp.n) html += '<div class="si-row"><span class="si-label">安检员</span>' + escapeHtml(data.insp.n) + '</div>';
    if (data.insp.d) html += '<div class="si-row"><span class="si-label">日期</span>' + data.insp.d + '</div>';
    html += '</div></div>';
  }
  
  html += '<div style="text-align:center;margin-top:20px;padding:16px 0;font-size:11px;color:var(--gray-light)">华帝股份有限公司 | 厨房电器上门安检检测报告</div>';
  
  document.getElementById('reportContent').innerHTML = html;
}

function checkUrlHash() {
  var hash = window.location.hash;
  if (hash.indexOf('#data=') === 0) {
    var compressed = hash.substring(6);
    try {
      var json = LZString.decompressFromBase64(compressed);
      var data = JSON.parse(json);
      if (data && data.v) {
        generatedData = data;
        document.getElementById('editMode').style.display = 'none';
        document.getElementById('resultModal').style.display = 'none';
        document.getElementById('viewMode').style.display = 'block';
        document.getElementById('modeSwitch').style.display = 'flex';
        document.getElementById('btnEditMode').classList.remove('active');
        document.getElementById('btnViewMode').classList.add('active');
        document.getElementById('headerSub').textContent = '厨房电器安检报告';
        currentMode = 'view';
        renderReport(data);
      }
    } catch(e) {
      console.error('Failed to parse report data:', e);
    }
  }
}

function switchMode(mode) {
  if (mode === 'edit') {
    document.getElementById('editMode').style.display = 'block';
    document.getElementById('viewMode').style.display = 'none';
    document.getElementById('resultModal').style.display = 'none';
    document.getElementById('btnEditMode').classList.add('active');
    document.getElementById('btnViewMode').classList.remove('active');
    document.getElementById('headerSub').textContent = '厨房电器上门安检';
    currentMode = 'edit';
  } else {
    if (!generatedData) {
      showToast('请先生成报告后再预览');
      return;
    }
    document.getElementById('editMode').style.display = 'none';
    document.getElementById('viewMode').style.display = 'block';
    document.getElementById('resultModal').style.display = 'none';
    document.getElementById('btnEditMode').classList.remove('active');
    document.getElementById('btnViewMode').classList.add('active');
    document.getElementById('headerSub').textContent = '检测报告预览';
    currentMode = 'view';
    renderReport(generatedData);
  }
  window.scrollTo(0, 0);
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

window.addEventListener('DOMContentLoaded', init);
window.addEventListener('hashchange', function() {
  if (currentMode === 'view' || document.getElementById('viewMode').style.display !== 'none') {
    checkUrlHash();
  }
});
</script>
</body>
</html>
